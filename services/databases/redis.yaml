services:
  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - homelab

volumes:
  redis_data:
